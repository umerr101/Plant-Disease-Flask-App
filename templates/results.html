<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - eco AgriScan AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #164533;
            --primary-green: #1a5c3d;
            --accent-mint: #a8d5ba;
            --accent-light: #d8eee5;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --text-muted: #999999;
            --bg-light: #f5f5f5;
            --bg-white: #ffffff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 80px;
        }

        /* Header */
        header {
            background: var(--bg-white);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: "🌿";
            font-size: 1.5rem;
        }

        .header-icon {
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* Main Container */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Environment Card */
        .environment-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            border: 1px solid var(--border-color);
        }

        .env-item {
            text-align: center;
        }

        .env-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .env-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        /* Results Image */
        .results-image {
            background: var(--primary-green);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .results-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .results-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.95);
            padding: 0.5rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-green);
        }

        /* Results Content */
        .results-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .result-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .disease-name {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.3rem;
        }

        .disease-subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 1rem;
        }

        .confidence-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .confidence-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .confidence-label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .confidence-percent {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-green);
        }

        .confidence-bar {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: var(--primary-green);
            transition: width 0.3s ease;
        }

        .accuracy-badge {
            display: inline-block;
            background: var(--accent-light);
            color: var(--primary-green);
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 0.75rem;
        }

        /* Disease Info */
        .disease-info-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .disease-info-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .info-subsection {
            margin-bottom: 1.25rem;
        }

        .info-subsection:last-child {
            margin-bottom: 0;
        }

        .info-subsection-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.6rem;
        }

        .info-subsection-content {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.6;
            margin-left: 1.5rem;
        }

        .treatment-item {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            padding: 0.75rem;
            background: var(--accent-light);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .treatment-item:last-child {
            margin-bottom: 0;
        }

        .treatment-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
            min-width: 24px;
            text-align: center;
        }

        .treatment-text {
            flex: 1;
        }

        .treatment-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .action-button {
            flex: 1;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 24px;
            padding: 0.85rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .action-button.secondary {
            background: var(--accent-light);
            color: var(--primary-green);
        }

        .action-button.secondary:hover {
            background: var(--border-color);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-white);
            border-top: 1px solid var(--border-color);
            padding: 1rem 0;
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            transition: all 0.3s ease;
            flex: 1;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary-green);
        }

        .nav-icon {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .nav-item.active .nav-icon {
            background: var(--primary-green);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            main {
                padding: 1.5rem;
            }

            .results-image {
                height: 250px;
            }

            .disease-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">eco AgriScan AI</div>
            <div class="header-icon">⚙️</div>
        </div>
    </header>

    <main>
        <!-- Environment Card -->
        <div class="environment-card">
            <div class="env-item">
                <div class="env-label">Temp</div>
                <div class="env-value">🌡️ 28°C</div>
            </div>
            <div class="env-item">
                <div class="env-label">Humidity</div>
                <div class="env-value">💧 64%</div>
            </div>
            <div class="env-item">
                <div class="env-label">Soil pH</div>
                <div class="env-value">🌍 6.8</div>
            </div>
        </div>

        <!-- Results Image with Badge -->
        <div class="results-image">
            <div class="results-badge" id="analysisStatus">Analysis Complete</div>
            <img id="resultImage" src="" alt="Leaf" />
        </div>

        <!-- Main Results -->
        <div class="results-card">
            <div class="result-label">Identified Condition</div>
            <div class="disease-name" id="diseaseName"></div>
            <div class="disease-subtitle" id="diseaseSubtitle"></div>

            <div class="confidence-section">
                <div class="confidence-header">
                    <div class="confidence-label">Confidence Level</div>
                    <div class="confidence-percent" id="confidencePercent"></div>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
                <div class="accuracy-badge" id="accuracyBadge">High Accuracy</div>
            </div>
        </div>

        <!-- Disease Information -->
        <div class="disease-info-card">
            <div class="disease-info-title">Disease Information</div>

            <div class="info-subsection">
                <div class="info-subsection-title">📖 Description</div>
                <div class="info-subsection-content" id="description"></div>
            </div>

            <div class="info-subsection">
                <div class="info-subsection-title">👁️ Symptoms</div>
                <div class="info-subsection-content" id="symptoms"></div>
            </div>

            <div class="info-subsection">
                <div class="info-subsection-title">🛡️ Treatment</div>
                <div id="treatments"></div>
            </div>

            <div class="info-subsection">
                <div class="info-subsection-title">🌱 Prevention</div>
                <div class="info-subsection-content" id="prevention"></div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-button secondary" onclick="goBack()">Save Analysis</button>
            <button class="action-button" onclick="newScan()">Diagnose Another Leaf</button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/" class="nav-item">
            <div class="nav-icon">📷</div>
            <span>Scan</span>
        </a>
        <a href="/database" class="nav-item">
            <div class="nav-icon">📚</div>
            <span>Database</span>
        </a>
        <a href="#" class="nav-item">
            <div class="nav-icon">⏱️</div>
            <span>History</span>
        </a>
        <a href="/about" class="nav-item">
            <div class="nav-icon">ℹ️</div>
            <span>About</span>
        </a>
    </div>

    <script>
        // Get query parameters
        const params = new URLSearchParams(window.location.search);
        const disease = params.get('disease');
        const confidence = parseFloat(params.get('confidence')) * 100;
        const imageData = localStorage.getItem('lastImage');

        // Display results
        document.getElementById('diseaseName').textContent = disease;
        document.getElementById('confidencePercent').textContent = confidence.toFixed(1) + '%';
        document.getElementById('confidenceFill').style.width = confidence + '%';

        if (imageData) {
            document.getElementById('resultImage').src = imageData;
        }

        // Determine accuracy badge
        if (confidence >= 90) {
            document.getElementById('accuracyBadge').textContent = 'Very High Accuracy';
        } else if (confidence >= 80) {
            document.getElementById('accuracyBadge').textContent = 'High Accuracy';
        } else if (confidence >= 70) {
            document.getElementById('accuracyBadge').textContent = 'Good Accuracy';
        } else {
            document.getElementById('accuracyBadge').textContent = 'Moderate Accuracy';
        }

        // Disease information database (matches your backend)
        const diseaseInfo = {
            'Tomato Early Blight': {
                subtitle: 'Alternaria solani',
                description: 'Early blight is a common fungal disease that affects tomato foliage, stems, and fruit. It typically starts on older leaves near the ground and progresses upwards through the plant.',
                symptoms: '• Small, dark spots on older leaves\n• Concentric "bullseye" rings within spots\n• Yellowing halos surrounding the infected areas\n• Infected leaves may drop prematurely',
                treatment: [
                    { title: 'Pruning', desc: 'Remove infected lower leaves immediately.' },
                    { title: 'Watering', desc: 'Avoid overhead irrigation; water at the base.' },
                    { title: 'Fungicide', desc: 'Apply copper-based fungicides as a preventative.' }
                ],
                prevention: 'Provide good air circulation, remove infected plant debris, practice crop rotation, and ensure proper spacing between plants for adequate airflow.'
            },
            'Tomato Late Blight': {
                subtitle: 'Phytophthora infestans',
                description: 'Late blight is a serious fungal disease caused by Phytophthora infestans. It can destroy an entire plant quickly, especially in cool, wet conditions.',
                symptoms: '• Water-soaked lesions on leaves and stems\n• White mold on leaf undersides\n• Dark brown lesions on stems\n• Rapid leaf yellowing and wilting',
                treatment: [
                    { title: 'Removal', desc: 'Remove and destroy infected plant parts.' },
                    { title: 'Fungicide', desc: 'Apply chlorothalonil or mancozeb fungicides.' },
                    { title: 'Spacing', desc: 'Improve air circulation around plants.' }
                ],
                prevention: 'Avoid overhead watering, mulch around plants, remove infected debris, and plant resistant varieties when available.'
            },
            'Tomato Healthy': {
                subtitle: 'No disease detected',
                description: 'Your tomato plants appear to be in excellent health. Continue regular monitoring and proper care practices to maintain this healthy status.',
                symptoms: '• No visible disease symptoms detected\n• Foliage appears vibrant and green\n• Plants show normal growth patterns',
                treatment: [
                    { title: 'Monitoring', desc: 'Continue regular plant inspection.' },
                    { title: 'Watering', desc: 'Water regularly at the base of plants.' },
                    { title: 'Support', desc: 'Provide proper staking and pruning.' }
                ],
                prevention: 'Maintain good garden hygiene, ensure proper spacing, avoid overhead watering, and monitor plants regularly for early detection of any issues.'
            }
        };

        // Display disease information
        const info = diseaseInfo[disease] || diseaseInfo['Tomato Healthy'];
        document.getElementById('diseaseSubtitle').textContent = info.subtitle;
        document.getElementById('description').textContent = info.description;
        document.getElementById('symptoms').textContent = info.symptoms;
        document.getElementById('prevention').textContent = info.prevention;

        // Display treatments
        const treatmentsHTML = info.treatment.map(t => `
            <div class="treatment-item">
                <div class="treatment-icon">✂️</div>
                <div class="treatment-text">
                    <div class="treatment-title">${t.title}</div>
                    <div>${t.desc}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('treatments').innerHTML = treatmentsHTML;

        function newScan() {
            localStorage.removeItem('lastImage');
            window.location.href = '/';
        }

        function goBack() {
            alert('Analysis saved! (This feature would save to a database in production)');
        }
    </script>
</body>
</html>
